model:
  default: gpt-5.4
  provider: custom
  base_url: https://api.openai.com/v1

timezone: Europe/Moscow

display:
  tool_progress: new

approvals:
  mode: manual
  timeout: 60

platform_toolsets:
  cli: [hermes-cli]
  telegram: [safe, todo]

platforms:
  telegram:
    reply_to_mode: first
    extra:
      disable_link_previews: true

group_sessions_per_user: true
thread_sessions_per_user: false

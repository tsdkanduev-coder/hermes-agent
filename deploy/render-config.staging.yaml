model:
  default: gpt-5.4
  provider: custom
  base_url: https://api.openai.com/v1

timezone: Europe/Moscow

cron:
  wrap_response: false

web:
  backend: firecrawl

stt:
  enabled: true
  provider: sber_salute
  sber_salute:
    model: general

tts:
  provider: sber_salute
  sber_salute:
    voice: Erm-Freespeech_24000
    format: opus
    content_type: application/ssml

display:
  tool_progress: off
  technical_notices: off
  busy_ack: off

session_reset:
  notify: false

approvals:
  mode: manual
  timeout: 60

platform_toolsets:
  cli: [hermes-cli]
  telegram: [safe, todo, cronjob, voice_call, calendar, google_workspace]

platforms:
  telegram:
    reply_to_mode: first
    extra:
      disable_link_previews: true
      prompt_for_home_channel: false
      publish_bot_commands: false

group_sessions_per_user: true
thread_sessions_per_user: false

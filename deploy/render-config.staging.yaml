model:
  default: gpt-5.4
  provider: custom
  base_url: https://api.openai.com/v1

timezone: Europe/Moscow

web:
  backend: firecrawl

display:
  tool_progress: off

approvals:
  mode: manual
  timeout: 60

platform_toolsets:
  cli: [hermes-cli]
  telegram: [safe, todo, voice_call]

platforms:
  telegram:
    reply_to_mode: first
    extra:
      disable_link_previews: true
      prompt_for_home_channel: false

group_sessions_per_user: true
thread_sessions_per_user: false
